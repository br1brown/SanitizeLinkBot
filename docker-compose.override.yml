# Development overrides - applicato automaticamente da Docker Compose
services:
  sanitizelinkbot:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - sanitizelinkbot:latest
    volumes:
      - .:/app  # Bind mount del codice per hot reload
      - bot-data:/app/data
    environment:
      - DEBUG=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    stdin_open: true
    tty: true
